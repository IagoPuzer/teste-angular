<p-card styleClass="h-full !rounded-xl !border !border-slate-200 !bg-white">
  <ng-template pTemplate="header">
    <div class="px-4 pt-4 sm:px-5 sm:pt-5">
      <p class="text-base font-semibold text-slate-900">Ultimos 5 processos</p>
    </div>
  </ng-template>
  <div class="max-w-full overflow-x-auto">
    <div class="min-w-[34rem]">
      <p-table
        [value]="latest"
        [tableStyle]="{ width: '100%', 'background-color': '#ffffff' }"
        styleClass="overflow-hidden rounded-lg border border-slate-300 bg-white">
        <ng-template pTemplate="header">
          <tr class="bg-slate-800">
            <th class="!bg-slate-800 px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-50">Numero</th>
            <th class="!bg-slate-800 px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-50">Cliente</th>
            <th class="!bg-slate-800 px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-50">Status</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-item>
          <tr class="border-t border-slate-300 bg-white transition-colors hover:bg-slate-100">
            <td class="!bg-white px-4 py-3 text-sm font-medium text-slate-950">{{ item.processNumber }}</td>
            <td class="!bg-white px-4 py-3 text-sm font-medium text-slate-950">{{ item.client }}</td>
            <td class="!bg-white px-4 py-3">
              <p-tag [value]="item.status" [style]="tagStyle(item.status)" />
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
</p-card>
