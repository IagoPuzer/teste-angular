<p-card styleClass="h-full !rounded-xl !border !border-slate-200 !bg-white">
  <ng-template pTemplate="header">
    <div class="px-4 pt-4 sm:px-5 sm:pt-5">
      <p class="text-base font-semibold text-slate-900">Distribuicao por status</p>
    </div>
  </ng-template>
  <div class="px-2 pb-2">
    <div class="mx-auto aspect-square w-full max-w-[200px] sm:max-w-[240px] lg:max-w-[280px]">
      <p-chart type="doughnut" [data]="chartData" [options]="chartOptions" />
    </div>
  </div>
</p-card>
