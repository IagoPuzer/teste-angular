<div class="grid gap-4 md:grid-cols-3">
  <p-card header="Total de processos">
    <p class="text-3xl font-bold text-slate-800">{{ total() }}</p>
  </p-card>
  <p-card header="Distribuicao por status" class="md:col-span-2">
    <p-chart type="doughnut" [data]="chartData()" />
  </p-card>
</div>

<p-card header="Ultimos 5 processos" class="mt-4">
  <p-table [value]="latest()">
    <ng-template pTemplate="header">
      <tr>
        <th>Numero</th>
        <th>Cliente</th>
        <th>Status</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
      <tr>
        <td>{{ item.processNumber }}</td>
        <td>{{ item.client }}</td>
        <td><p-tag [value]="item.status" /></td>
      </tr>
    </ng-template>
  </p-table>
</p-card>
