<section class="w-full space-y-4 px-1 pb-2 sm:space-y-6 sm:px-0">
  <div class="space-y-1">
    <h1 class="text-xl font-semibold text-slate-900 sm:text-2xl">Visao geral</h1>
    <p class="text-sm text-slate-700">Acompanhe volume, status e ultimos processos cadastrados.</p>
  </div>

  <div class="grid grid-cols-1 gap-3 sm:grid-cols-2 xl:grid-cols-4">
    <app-stats-card label="Total de processos" [value]="total()" valueClass="text-slate-900" />
    <app-stats-card label="Ativos" [value]="statusStats().ATIVO" valueClass="text-emerald-700" />
    <app-stats-card label="Finalizados" [value]="statusStats().FINALIZADO" valueClass="text-indigo-700" />
    <app-stats-card label="Suspensos" [value]="statusStats().SUSPENSO" valueClass="text-amber-700" />
  </div>

  <div class="grid gap-3 sm:gap-4 xl:grid-cols-12">
    <div class="min-w-0 xl:col-span-4">
      <app-status-chart [chartData]="chartData()" [chartOptions]="chartOptions()" />
    </div>

    <div class="min-w-0 xl:col-span-8">
      <app-latest-processes-table [latest]="latest()" />
    </div>
  </div>
</section>
