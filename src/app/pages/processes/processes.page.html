<p-toast />

<section class="space-y-6 sm:space-y-8">
  <div class="space-y-1">
    <h1 class="text-xl font-semibold text-slate-900 sm:text-2xl">Processos</h1>
    <p class="text-sm text-slate-700">Filtre, ordene e gerencie os processos em um unico painel.</p>
  </div>

  <p-card styleClass="!rounded-xl !border !border-slate-200 !bg-white my-4">
    <ng-template pTemplate="header">
      <div class="px-4 pt-4 sm:px-6 sm:pt-6">
        <p class="text-base font-semibold text-slate-900">Filtros e acoes</p>
      </div>
    </ng-template>

    <div class="rounded-lg border border-slate-100 bg-slate-50/70 p-3 sm:p-4">
      <div class="flex flex-wrap items-center gap-3 sm:gap-4">
        <input
          pInputText
          placeholder="Filtrar por cliente"
          [(ngModel)]="filters.client"
          (keyup.enter)="applyFilters()"
          class="w-full rounded-lg !border-slate-300 !bg-white !text-slate-900 placeholder:!text-slate-400 md:w-80"
        />
        <p-select
          [options]="statusOptions"
          optionLabel="label"
          optionValue="value"
          [ngModel]="filters.status"
          (ngModelChange)="setStatus($event)"
          placeholder="Todos os status"
          class="w-full md:w-56"
          styleClass="!border-slate-300 !bg-white !text-slate-900
            [&_.p-select-label]:!text-slate-700
            [&_.p-select-label]:!opacity-100
            [&_.p-placeholder]:!text-slate-400
            [&_.p-select-dropdown-icon]:!text-slate-500"
          panelStyleClass="!bg-white !border !border-slate-300
            [&_.p-select-list-container]:!bg-white
            [&_.p-select-option]:!text-slate-700
            [&_.p-select-option:hover]:!bg-slate-100
            [&_.p-select-option.p-select-option-selected]:!bg-emerald-100
            [&_.p-select-option.p-select-option-selected]:!text-emerald-800"
        />
        <p-button label="Novo processo" icon="pi pi-plus" (onClick)="openCreate()" styleClass="!bg-emerald-500 !border-emerald-500 hover:!bg-emerald-600 hover:!border-emerald-600" />
      </div>
    </div>
  </p-card>

  <app-process-list
    [processes]="items()"
    [total]="total()"
    [rows]="rows()"
    [first]="first()"
    (pageChange)="onPageChange($event)"
    (edit)="openEdit($event)"
    (remove)="remove($event)"
  />
</section>

<p-dialog
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [visible]="showForm()"
  (visibleChange)="onFormVisibilityChange($event)"
  [header]="editing() ? 'Editar processo' : 'Novo processo'"
  [style]="{ width: '36rem' }"
  styleClass="!rounded-xl !shadow-lg !border-0 overflow-hidden
    [&_.p-dialog-header]:!bg-white
    [&_.p-dialog-header]:!text-slate-900
    [&_.p-dialog-header]:!border-b
    [&_.p-dialog-header]:!border-slate-200
    [&_.p-dialog-content]:!bg-white
    [&_.p-dialog-content]:!text-slate-900
    [&_.p-dialog-header-icon]:!text-slate-500
    [&_.p-dialog-header-icon:hover]:!bg-slate-100
    [&_.p-dialog-header-icon:hover]:!text-slate-700">
  @if (showForm()) {
    <app-process-form [process]="editing()" (save)="save($event)" />
  }
</p-dialog>

<app-delete-confirm-dialog
  [visible]="showDeleteConfirm()"
  [processNumber]="deleting()?.processNumber ?? ''"
  (confirm)="confirmDelete()"
  (visibleChange)="onDeleteDialogVisibilityChange($event)"
/>
