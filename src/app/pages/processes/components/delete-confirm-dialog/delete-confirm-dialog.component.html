<p-dialog
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [visible]="visible"
  (visibleChange)="visibleChange.emit($event)"
  header="Confirmar exclusao"
  [style]="{ width: '30rem' }"
  styleClass="!rounded-xl !border !border-slate-200
    [&_.p-dialog-header]:!bg-white
    [&_.p-dialog-header]:!text-slate-900
    [&_.p-dialog-header]:!border-b
    [&_.p-dialog-header]:!border-slate-200
    [&_.p-dialog-content]:!bg-white
    [&_.p-dialog-content]:!text-slate-700
    [&_.p-dialog-footer]:!bg-white
    [&_.p-dialog-footer]:!border-t
    [&_.p-dialog-footer]:!border-slate-200
    [&_.p-dialog-header-icon]:!text-slate-500
    [&_.p-dialog-header-icon:hover]:!bg-slate-100
    [&_.p-dialog-header-icon:hover]:!text-slate-700">
  <div class="flex items-start gap-3">
    <i class="pi pi-exclamation-triangle mt-1 text-amber-500"></i>
    <p class="text-sm text-slate-700">
      Deseja excluir o processo
      <span class="font-semibold text-slate-900">{{ processNumber }}</span
      >?
    </p>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2">
      <p-button label="Cancelar" [text]="true" styleClass="!text-slate-600 hover:!bg-slate-100" (onClick)="close()" />
      <p-button label="Excluir" styleClass="!bg-rose-500 !border-rose-500 hover:!bg-rose-600 hover:!border-rose-600" (onClick)="onConfirm()" />
    </div>
  </ng-template>
</p-dialog>
