<p-card styleClass="!rounded-xl !border !border-slate-200 !bg-white">
  <ng-template pTemplate="header">
    <div class="px-4 pt-4 sm:px-6 sm:pt-6">
      <p class="text-base font-semibold text-slate-900">Lista de processos</p>
    </div>
  </ng-template>

  <div
    #paginatorHost
    class="[&_.p-select-overlay]:!bg-white
      [&_.p-select-overlay]:!border-slate-300
      [&_.p-select-list-container]:!bg-white
      [&_.p-select-option]:!text-slate-700
      [&_.p-select-option:hover]:!bg-slate-100
      [&_.p-select-option.p-select-option-selected]:!bg-emerald-100
      [&_.p-select-option.p-select-option-selected]:!text-emerald-800">
    <p-table
      [value]="processes"
      [paginator]="true"
      [rows]="rows"
      [first]="first"
      [totalRecords]="total"
      [rowsPerPageOptions]="[5, 10, 20]"
      [paginatorDropdownAppendTo]="paginatorHost"
      [lazy]="true"
      [tableStyle]="{ width: '100%' }"
      paginatorStyleClass="!bg-slate-50 !text-slate-700 border-t border-slate-200
        [&_.p-paginator-page]:!text-slate-600
        [&_.p-paginator-page:hover]:!bg-slate-100
        [&_.p-paginator-page.p-highlight]:!bg-emerald-100
        [&_.p-paginator-page.p-highlight]:!text-emerald-800
        [&_.p-paginator-first]:!text-slate-400
        [&_.p-paginator-first:hover]:!bg-slate-100
        [&_.p-paginator-prev]:!text-slate-400
        [&_.p-paginator-prev:hover]:!bg-slate-100
        [&_.p-paginator-next]:!text-slate-400
        [&_.p-paginator-next:hover]:!bg-slate-100
        [&_.p-paginator-last]:!text-slate-400
        [&_.p-paginator-last:hover]:!bg-slate-100
        [&_.p-select]:!bg-white
        [&_.p-select]:!border-slate-300
        [&_.p-select-label]:!text-slate-700
        [&_.p-select-dropdown-icon]:!text-slate-600"
      styleClass="rounded-lg border border-slate-300 bg-white shadow-sm"
      (onPage)="pageChange.emit({ page: ($event.first / $event.rows), rows: $event.rows })">
    <ng-template pTemplate="header">
      <tr class="bg-slate-800">
        <th class="!bg-slate-800 px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-50" pSortableColumn="processNumber">Numero</th>
        <th class="!bg-slate-800 px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-50" pSortableColumn="client">Cliente</th>
        <th class="!bg-slate-800 px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-50">Descricao</th>
        <th class="!bg-slate-800 px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-50" pSortableColumn="status">Status</th>
        <th class="!bg-slate-800 px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-50" pSortableColumn="createdAt">Data</th>
        <th class="!bg-slate-800 px-4 py-3 text-left text-xs font-semibold uppercase tracking-wide text-slate-50">Acoes</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-item>
      <tr class="border-t border-slate-200 bg-white transition-colors hover:bg-slate-50">
        <td class="!bg-white px-4 py-3.5 text-sm font-medium text-slate-950">{{ item.processNumber }}</td>
        <td class="!bg-white px-4 py-3.5 text-sm font-medium text-slate-950">{{ item.client }}</td>
        <td class="!bg-white px-4 py-3.5 text-sm text-slate-700">{{ item.description }}</td>
        <td class="!bg-white px-4 py-3">
          <p-tag [value]="item.status" [style]="tagStyle(item.status)" />
        </td>
        <td class="!bg-white px-4 py-3.5 text-sm text-slate-700">{{ item.createdAt }}</td>
        <td class="!bg-white px-4 py-3">
          <div class="flex gap-2">
            <p-button
              icon="pi pi-pencil"
              size="small"
              [rounded]="true"
              [text]="true"
              styleClass="!text-slate-600 hover:!text-slate-900"
              (onClick)="edit.emit(item)" />
            <p-button
              icon="pi pi-trash"
              size="small"
              [rounded]="true"
              [text]="true"
              styleClass="!text-rose-600 hover:!text-rose-700"
              (onClick)="remove.emit(item)" />
          </div>
        </td>
      </tr>
    </ng-template>
    </p-table>
  </div>
</p-card>
