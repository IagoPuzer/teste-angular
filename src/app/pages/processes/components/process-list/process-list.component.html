<p-table
  [value]="processes"
  [paginator]="true"
  [rows]="rows"
  [first]="first"
  [totalRecords]="total"
  [rowsPerPageOptions]="[5, 10, 20]"
  [lazy]="true"
  (onPage)="pageChange.emit({ page: ($event.first / $event.rows), rows: $event.rows })"
>
  <ng-template pTemplate="header">
    <tr>
      <th pSortableColumn="processNumber">Numero</th>
      <th pSortableColumn="client">Cliente</th>
      <th>Descricao</th>
      <th pSortableColumn="status">Status</th>
      <th pSortableColumn="createdAt">Data</th>
      <th>Acoes</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-item>
    <tr>
      <td>{{ item.processNumber }}</td>
      <td>{{ item.client }}</td>
      <td>{{ item.description }}</td>
      <td><p-tag [value]="item.status" /></td>
      <td>{{ item.createdAt }}</td>
      <td class="flex gap-2">
        <p-button label="Editar" size="small" (onClick)="edit.emit(item)" />
        <p-button label="Excluir" size="small" severity="danger" (onClick)="remove.emit(item)" />
      </td>
    </tr>
  </ng-template>
</p-table>
